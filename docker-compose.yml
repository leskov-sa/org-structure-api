version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: org_db
      POSTGRES_USER: org_user
      POSTGRES_PASSWORD: org_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://org_user:org_pass@db:5432/org_db

volumes:
  postgres_data:
